<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2d1e"/>
      <stop offset="100%" style="stop-color:#1a5c3a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)" rx="12"/>
  <!-- Tower -->
  <polygon points="300,50 280,380 320,380" fill="#41CE22" opacity="0.8"/>
  <polygon points="300,50 260,200 340,200" fill="#41CE22" opacity="0.6"/>
  <!-- Tower details -->
  <rect x="270" y="120" width="60" height="4" fill="#169179"/>
  <rect x="265" y="200" width="70" height="4" fill="#169179"/>
  <rect x="260" y="280" width="80" height="4" fill="#169179"/>
  <!-- Signal waves -->
  <g stroke="#41CE22" stroke-width="3" fill="none" opacity="0.7">
    <path d="M180,150 Q240,100 300,120 Q360,140 420,150"/>
    <path d="M140,120 Q220,50 300,80 Q380,110 460,120"/>
    <path d="M100,90 Q200,0 300,40 Q400,80 500,90"/>
  </g>
  <!-- DAB+ text -->
  <text x="300" y="360" text-anchor="middle" font-family="Arial Black, Arial" font-size="28" font-weight="900" fill="#41CE22">DAB+</text>
  <!-- Frequency labels -->
  <text x="90" y="260" font-family="Arial" font-size="14" fill="#fff" opacity="0.8">95.5 FM</text>
  <text x="90" y="280" font-family="Arial" font-size="11" fill="#41CE22" opacity="0.7">Saint-Philippe</text>
  <text x="420" y="260" font-family="Arial" font-size="14" fill="#fff" opacity="0.8">105.2 FM</text>
  <text x="420" y="280" font-family="Arial" font-size="11" fill="#41CE22" opacity="0.7">Le Tremblet</text>
  <text x="90" y="320" font-family="Arial" font-size="14" fill="#fff" opacity="0.8">92.3 FM</text>
  <text x="90" y="340" font-family="Arial" font-size="11" fill="#41CE22" opacity="0.7">Saint-Joseph</text>
</svg>
