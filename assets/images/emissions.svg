<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e1a"/>
      <stop offset="100%" style="stop-color:#0d3d2a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)" rx="12"/>
  <!-- Microphone -->
  <rect x="270" y="80" width="60" height="100" rx="30" fill="#41CE22"/>
  <rect x="260" y="80" width="80" height="80" rx="40" fill="#2eaa1a"/>
  <!-- Mic details -->
  <line x1="285" y1="100" x2="315" y2="100" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="283" y1="115" x2="317" y2="115" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="285" y1="130" x2="315" y2="130" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- Mic stand -->
  <rect x="298" y="200" width="4" height="80" fill="#169179"/>
  <rect x="260" y="275" width="80" height="6" rx="3" fill="#169179"/>
  <!-- Sound waves -->
  <g stroke="#41CE22" stroke-width="2" fill="none" opacity="0.6">
    <path d="M230,120 Q215,150 230,180"/>
    <path d="M210,100 Q185,150 210,200"/>
    <path d="M370,120 Q385,150 370,180"/>
    <path d="M390,100 Q415,150 390,200"/>
  </g>
  <!-- MémoireSport label -->
  <rect x="160" y="310" width="280" height="50" rx="8" fill="#41CE22" opacity="0.15" stroke="#41CE22" stroke-width="1"/>
  <text x="300" y="333" text-anchor="middle" font-family="Arial Black" font-size="14" fill="#41CE22">MémoireSport</text>
  <text x="300" y="352" text-anchor="middle" font-family="Arial" font-size="11" fill="#ccc">avec Guillaume Baret</text>
  <!-- On-Air indicator -->
  <circle cx="520" cy="60" r="20" fill="#ff3333"/>
  <text x="520" y="55" text-anchor="middle" font-family="Arial Black" font-size="9" fill="#fff">ON</text>
  <text x="520" y="68" text-anchor="middle" font-family="Arial Black" font-size="9" fill="#fff">AIR</text>
</svg>
