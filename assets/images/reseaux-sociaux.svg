<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2b1e"/>
      <stop offset="100%" style="stop-color:#1a4a30"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg4)" rx="12"/>
  <!-- Social icons grid -->
  <!-- Facebook -->
  <rect x="80" y="100" width="100" height="100" rx="16" fill="#1877F2" opacity="0.9"/>
  <text x="130" y="165" text-anchor="middle" font-family="Arial Black" font-size="50" fill="#fff">f</text>
  <text x="130" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#ccc">Facebook</text>
  <!-- Instagram -->
  <rect x="250" y="100" width="100" height="100" rx="16" fill="#E1306C" opacity="0.9"/>
  <circle cx="300" cy="150" r="25" stroke="#fff" stroke-width="4" fill="none"/>
  <circle cx="300" cy="150" r="12" fill="#fff" opacity="0.8"/>
  <circle cx="322" cy="128" r="4" fill="#fff"/>
  <text x="300" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#ccc">Instagram</text>
  <!-- YouTube -->
  <rect x="420" y="100" width="100" height="100" rx="16" fill="#FF0000" opacity="0.9"/>
  <polygon points="480,150 465,140 465,160" fill="#fff"/>
  <text x="470" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#ccc">YouTube</text>
  <!-- Replay label -->
  <rect x="150" y="280" width="300" height="60" rx="10" fill="#41CE22" opacity="0.15" stroke="#41CE22" stroke-width="1"/>
  <text x="300" y="308" text-anchor="middle" font-family="Arial Black" font-size="16" fill="#41CE22">REPLAY</text>
  <text x="300" y="328" text-anchor="middle" font-family="Arial" font-size="12" fill="#aaa">Vos émissions en replay 24h/24</text>
  <!-- Connecting lines -->
  <line x1="180" y1="150" x2="250" y2="150" stroke="#41CE22" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="350" y1="150" x2="420" y2="150" stroke="#41CE22" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
</svg>
