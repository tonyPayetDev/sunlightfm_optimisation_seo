<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#169179"/>
      <stop offset="100%" style="stop-color:#0a3d2a"/>
    </linearGradient>
    <linearGradient id="islandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#41CE22"/>
      <stop offset="100%" style="stop-color:#1a6b2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#oceanGrad)"/>
  <!-- Island shape (approximate Reunion) -->
  <ellipse cx="600" cy="320" rx="280" ry="180" fill="url(#islandGrad)" opacity="0.9"/>
  <!-- Mountain peak -->
  <polygon points="600,120 550,280 650,280" fill="#2eaa1a"/>
  <polygon points="480,200 450,280 510,280" fill="#35b81e"/>
  <polygon points="720,220 690,280 750,280" fill="#35b81e"/>
  <!-- Radio coverage areas -->
  <circle cx="450" cy="380" r="60" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8" opacity="0.6"/>
  <circle cx="600" cy="280" r="80" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8" opacity="0.6"/>
  <circle cx="720" cy="350" r="50" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8" opacity="0.6"/>
  <!-- Coverage labels -->
  <text x="400" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" opacity="0.8">Grand Sud</text>
  <text x="600" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" opacity="0.8">Ouest</text>
  <text x="750" y="355" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" opacity="0.8">Nord</text>
</svg>
