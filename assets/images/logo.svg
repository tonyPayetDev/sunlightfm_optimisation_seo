<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41CE22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#169179;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41CE22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2eaa1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sun icon -->
  <circle cx="40" cy="40" r="16" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <line x1="40" y1="10" x2="40" y2="18" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="40" y2="70" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="40" x2="18" y2="40" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="40" x2="70" y2="40" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="18.6" y1="18.6" x2="24.3" y2="24.3" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="55.7" y1="55.7" x2="61.4" y2="61.4" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="61.4" y1="18.6" x2="55.7" y2="24.3" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <line x1="24.3" y1="55.7" x2="18.6" y2="61.4" stroke="#41CE22" stroke-width="3" stroke-linecap="round"/>
  <!-- Radio wave -->
  <path d="M28 40 Q40 28 52 40" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="40" cy="40" r="4" fill="#fff"/>
  <!-- Text -->
  <text x="88" y="34" font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="url(#textGrad)">SUNLIGHT</text>
  <text x="88" y="58" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="700" fill="#169179">FM</text>
  <!-- Tagline -->
  <text x="88" y="72" font-family="Arial, sans-serif" font-size="9" fill="#666">LA RADIO DE LA RÉUNION</text>
</svg>
