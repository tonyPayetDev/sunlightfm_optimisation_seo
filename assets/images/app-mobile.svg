<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3d2a"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)" rx="12"/>
  <!-- Phone body -->
  <rect x="210" y="30" width="180" height="340" rx="20" fill="url(#phoneGrad)" stroke="#41CE22" stroke-width="2"/>
  <!-- Phone screen -->
  <rect x="220" y="55" width="160" height="290" rx="8" fill="#0a0a0a"/>
  <!-- App UI on screen -->
  <rect x="225" y="60" width="150" height="50" rx="6" fill="#169179"/>
  <circle cx="260" cy="85" r="15" fill="#41CE22"/>
  <text x="283" y="82" font-family="Arial Black" font-size="9" fill="#fff">SUNLIGHT FM</text>
  <text x="283" y="96" font-family="Arial" font-size="8" fill="#ccc">La radio de la Réunion</text>
  <!-- Play button -->
  <circle cx="300" cy="190" r="35" fill="#41CE22"/>
  <polygon points="292,178 292,202 318,190" fill="#fff"/>
  <!-- Progress bar -->
  <rect x="235" y="240" width="130" height="4" rx="2" fill="#333"/>
  <rect x="235" y="240" width="70" height="4" rx="2" fill="#41CE22"/>
  <!-- Wave animation bars -->
  <g fill="#41CE22" opacity="0.8">
    <rect x="245" y="265" width="8" height="20" rx="2"/>
    <rect x="258" y="258" width="8" height="27" rx="2"/>
    <rect x="271" y="262" width="8" height="23" rx="2"/>
    <rect x="284" y="255" width="8" height="30" rx="2"/>
    <rect x="297" y="260" width="8" height="25" rx="2"/>
    <rect x="310" y="263" width="8" height="22" rx="2"/>
    <rect x="323" y="257" width="8" height="28" rx="2"/>
    <rect x="336" y="264" width="8" height="21" rx="2"/>
  </g>
  <!-- Google Play badge area -->
  <rect x="235" y="305" width="130" height="35" rx="6" fill="#333"/>
  <text x="265" y="320" font-family="Arial" font-size="8" fill="#ccc">Disponible sur</text>
  <text x="255" y="334" font-family="Arial Black" font-size="10" fill="#41CE22">Google Play</text>
  <!-- Phone notch -->
  <rect x="270" y="42" width="60" height="8" rx="4" fill="#333"/>
</svg>
