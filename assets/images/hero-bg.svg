<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="1440" height="600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4f3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#169179;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a6b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunHeroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41CE22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f7bc1b;stop-opacity:0.7" />
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#41CE22;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#41CE22;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1440" height="600" fill="url(#skyGrad)"/>
  <!-- Sun glow -->
  <circle cx="720" cy="200" r="300" fill="url(#sunGlow)"/>
  <!-- Sun -->
  <circle cx="720" cy="200" r="80" fill="url(#sunHeroGrad)" opacity="0.8"/>
  <!-- Sun rays -->
  <g stroke="#41CE22" stroke-width="3" opacity="0.5">
    <line x1="720" y1="80" x2="720" y2="40"/>
    <line x1="720" y1="320" x2="720" y2="360"/>
    <line x1="600" y1="200" x2="560" y2="200"/>
    <line x1="840" y1="200" x2="880" y2="200"/>
    <line x1="635" y1="115" x2="607" y2="87"/>
    <line x1="805" y1="285" x2="833" y2="313"/>
    <line x1="805" y1="115" x2="833" y2="87"/>
    <line x1="635" y1="285" x2="607" y2="313"/>
  </g>
  <!-- Radio waves -->
  <g stroke="#41CE22" stroke-width="2" fill="none" opacity="0.4">
    <ellipse cx="720" cy="200" rx="120" ry="60"/>
    <ellipse cx="720" cy="200" rx="180" ry="90"/>
    <ellipse cx="720" cy="200" rx="240" ry="120"/>
  </g>
  <!-- Mountain silhouette (Piton de la Fournaise) -->
  <polygon points="0,600 200,350 350,420 500,280 650,380 720,320 800,380 950,280 1100,400 1250,350 1440,450 1440,600" fill="#0a3d2a" opacity="0.8"/>
  <polygon points="0,600 150,400 300,460 500,600" fill="#0d4a34" opacity="0.6"/>
  <polygon points="900,600 1000,400 1100,450 1250,380 1440,480 1440,600" fill="#0d4a34" opacity="0.6"/>
  <!-- Ocean -->
  <rect x="0" y="520" width="1440" height="80" fill="#169179" opacity="0.3"/>
  <!-- Particles/stars -->
  <g fill="#41CE22" opacity="0.6">
    <circle cx="100" cy="80" r="2"/>
    <circle cx="200" cy="150" r="1.5"/>
    <circle cx="350" cy="60" r="2"/>
    <circle cx="500" cy="120" r="1"/>
    <circle cx="900" cy="90" r="2"/>
    <circle cx="1050" cy="50" r="1.5"/>
    <circle cx="1200" cy="130" r="2"/>
    <circle cx="1350" cy="80" r="1"/>
    <circle cx="150" cy="250" r="1.5"/>
    <circle cx="1300" cy="200" r="1.5"/>
  </g>
</svg>
